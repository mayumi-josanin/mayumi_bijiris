<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>まゆみ助産院 アンケート</title>
    <meta name="theme-color" content="#8a9e7e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="まゆみアンケート" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="./manifest.webmanifest?v=20260413-15" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="icon" href="./icons/icon-192.png" sizes="192x192" />
    <link rel="stylesheet" href="./styles.css?v=20260413-15" />
  </head>
  <body>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <header class="app-header">
      <div class="brand">
        <img src="./icons/icon-192.png" alt="まゆみ助産院" />
        <div>
          <div class="brand-name">まゆみ助産院</div>
          <div class="brand-sub">アンケート回答アプリ</div>
        </div>
      </div>
      <div class="header-actions">
        <button id="appUpdateButton" class="header-button" type="button">更新</button>
        <button id="installButton" class="header-button" type="button" hidden>追加</button>
      </div>
    </header>

    <main>
      <section id="page-login" class="page active">
        <section class="welcome-card">
          <p class="eyebrow">Member</p>
          <h1>初めての方は会員登録してください</h1>
          <p id="registrationLead">ホーム画面に追加したアプリから会員登録してください。</p>
        </section>

        <section class="section-card">
          <h2>会員登録 / 復旧</h2>
          <form id="customerLoginForm" class="form-grid">
            <label>
              お名前(漢字・フルネーム)
              <input name="name" type="text" autocomplete="name" required />
            </label>
            <label>
              フリガナ(カタカナ)
              <input name="nameKana" type="text" autocapitalize="characters" required />
            </label>
            <button class="primary-button" type="submit" id="customerRegisterButton">会員登録する</button>
            <button class="secondary-button" type="button" id="recoverAccountButton">登録済みの方 / 名前一致で復旧</button>
          </form>
        </section>
      </section>

      <section id="page-home" class="page">
        <section class="welcome-card">
          <p class="eyebrow">Survey</p>
          <h1>アンケートを選択してください</h1>
          <p>ログイン後、回答したいアンケートを押してください。</p>
        </section>

        <section class="section-card">
          <h2>お客様情報</h2>
          <form id="customerForm" class="form-grid">
            <label>
              お名前(漢字・フルネーム)
              <input name="name" type="text" autocomplete="name" required />
            </label>
            <label>
              フリガナ(カタカナ)
              <input name="nameKana" type="text" autocapitalize="characters" required />
            </label>
            <button class="primary-button" type="submit">保存する</button>
          </form>
        </section>

        <section class="section-card">
          <div class="section-head">
            <div>
              <h2>回数券スタンプ</h2>
              <p>最新の回答内容から現在の回数券状況を表示します。</p>
            </div>
          </div>
          <div id="homeTicketStatus" class="home-ticket-status"></div>
        </section>

        <section class="section-card">
          <div class="section-head">
            <div>
              <h2>アンケート</h2>
              <p>回答するアンケートを選んでください。</p>
            </div>
            <button id="refreshButton" class="ghost-button" type="button">更新</button>
          </div>
          <div id="surveyList" class="survey-list"></div>
        </section>

      </section>

      <section id="page-survey" class="page">
        <section id="answerPanel" class="section-card"></section>
      </section>

      <section id="page-history" class="page">
        <section class="section-card">
          <div class="section-head">
            <div>
              <h1>回答履歴</h1>
              <p>この端末から送信した回答履歴を表示します。</p>
            </div>
            <button id="historyRefreshButton" class="ghost-button" type="button">更新</button>
          </div>
          <div id="historyList" class="history-list"></div>
        </section>
      </section>

    </main>

    <nav id="bottomNav" class="bottom-nav" aria-label="お客様アプリメニュー" hidden>
      <button class="nav-button active" type="button" data-page="home">
        <span>🏠</span>
        ホーム
      </button>
      <button class="nav-button" type="button" data-page="history">
        <span>🕒</span>
        履歴
      </button>
    </nav>

    <script src="../default-surveys.js?v=20260413-15"></script>
    <script src="../shared/gas-config.js?v=20260413-15"></script>
    <script src="../shared/api.js?v=20260413-15"></script>
    <script src="./app.js?v=20260413-15"></script>
  </body>
</html>
